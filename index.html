<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Design</title>
    <style>
       
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow-x: hidden; 
            overflow-y: auto;
            font-family: 'Arial Black', sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            padding: 20px;
            transition: background-color 0.2s;
        }
                                        
       
        .container {
            position: relative;
            z-index: 10;
            background: #fff;
            padding: 40px;
            border: 5px solid #000;
            box-shadow: 20px 20px 0px #ff0055;
            text-align: center;
            cursor: pointer;
            user-select: none;
            width: 100%;
            max-width: 450px; 
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .container:active {
            transform: translate(10px, 10px);
            box-shadow: 10px 10px 0px #ff0055; 
        }

       
        h1 {
            margin: 0;
            font-size: 4rem;
            color: #000;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 5px 15px;
            margin-top: 15px;
            margin-bottom: 0;
        }

       
                                                          /* --- Neither I nor anyone else knows how this works --- */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 30px 20px;
                box-shadow: 12px 12px 0px #ff0055;
            }

            .container:active {
                transform: translate(6px, 6px);
                box-shadow: 6px 6px 0px #ff0055;
            }

            h1 {
                font-size: 2.8rem;
                letter-spacing: -1px;
            }

            p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container" onclick="cambiarColor()">
        <h1>WOW.</h1>
        <p>MUEVE EL MOUSE O TOCA AQUÍ</p>
    </div>

    <script>
       
        document.addEventListener('mousemove', (e) => {
            const r = Math.round((e.clientX / window.innerWidth) * 255);
            const g = Math.round((e.clientY / window.innerHeight) * 255);
            const b = 150;
            document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        });

        function cambiarColor() {
            const randomColor = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');

            const esMovil = window.innerWidth <= 480;
            const tamanoSombra = esMovil ? '12px' : '20px';
            
            document.querySelector('.container').style.boxShadow = `${tamanoSombra} ${tamanoSombra} 0px #${randomColor}`;
        }
    </script>

</body>
</html>
