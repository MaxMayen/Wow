<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Design</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.2s;
        }
                                
                     <!---Neither I nor anyone else knows how this works---->

        .container {
            position: relative;
            z-index: 10;
            background: #fff;
            padding: 40px;
            border: 5px solid #000;
            box-shadow: 20px 20px 0px #ff0055;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .container:active {
            transform: translate(10px, 10px);
            box-shadow: 5px 5px 0px #000;
        }

        h1 {
            margin: 0;
            font-size: 4rem;
            color: #000;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.2rem;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 5px 15px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container" onclick="cambiarColor()">
        <h1>WOW.</h1>
        <p>MUEVE EL MOUSE O TOCA AQUÍ</p>
    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const r = Math.round((e.clientX / window.innerWidth) * 255);
            const g = Math.round((e.clientY / window.innerHeight) * 255);
            const b = 150;
            document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        });

        function cambiarColor() {
            const randomColor = Math.floor(Math.random()*16777215).toString(16);
            document.querySelector('.container').style.boxShadow = `20px 20px 0px #${randomColor}`;
        }
    </script>

</body>
</html>
